# docker-compose.yml
version: '3.9'

services:

  redis:
    image: "redis:latest" # Uses the official Redis image from Docker Hub
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # limit each log file to 10 MB
        max-file: "3"     # keep a maximum of 3 rotated files
    ports:
      - "6379:6379"
    networks:
      - app_internal_network
  
  flask_app:
    build:
      context: .
      dockerfile: Dockerfile.flask
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m" # limit each log file to 10 MB
        max-file: "3"  # keep a maximum of 3 rotated files
    env_file:
      - ./.env
    environment:
      PYTHONUNBUFFERED: 1
    container_name: flask_app_container
    expose:
      - "8000" # Expose port 8000 within the Docker network, not to the host machine
    ports:
      - "8000:8000" # Opens port 8000 to host machine
    depends_on:
      - redis
    networks:
      - app_internal_network
  
  nginx:
    image: nginx:latest
    restart: unless-stopped
    container_name: nginx_reverse_proxy
    logging:
      driver: "json-file"
      options:
        max-size: "10m" # limit each log file to 10 MB
        max-file: "3"  # keep a maximum of 3 rotated files
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro # Mount the Nginx Configuration
      # where certbot placed the initial tls cert, and where refreshed certs will be placed
      - /etc/letsencrypt:/etc/letsencrypt:rw
      # where certbot writes challenge files to when being challenged by a Let's Encrypt server
      - /var/www/certbot:/var/www/certbot:ro
    ports:
      - "80:80" # Map host port 80 to Caddy's port 80
      - "443:443" # Uncomment to enable HTTPS on port 443
    depends_on:
      - flask_app # Ensure the Flask app starts before Caddy
    networks:
      - app_internal_network

# Networks
networks:
  app_internal_network:
    driver: bridge
