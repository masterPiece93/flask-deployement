events {}
http {
  server {
    # this server listens on 443
    listen 443 ssl;
    # incoming requests must have this hostname.
    server_name theankit.in www.theankit.in;
    
    # the location of the tls cert.
    ssl_certificate /etc/letsencrypt/live/theankit.in/fullchain.pem;
    # the location of the tls cert's private key.
    ssl_certificate_key /etc/letsencrypt/live/theankit.in/privkey.pem;

    location / {
      proxy_pass http://flask_app:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    # this server listens on 80
    listen 80;
    # incoming requests must have this hostname.
    server_name theankit.in www.theankit.in;

    # the location Let's Encrypt challenge will make requests to
    location /.well-known/acme-challenge/ {
        # where certbot will create the challenge files
         root /var/www/certbot;
    }

    # redirect anything else to https
    location / {
        return 301 https://$host$request_uri;
    }

  }
}
