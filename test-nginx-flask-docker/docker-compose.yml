version: '3.8'

services:
  flask-app:
    build:
      context: .
      dockerfile: Dockerfile.flask
    expose:
      - "5000"
    container_name: flask_app_container
    networks:
      - my_network

  nginx:
    image: nginx:alpine
    container_name: nginx_reverse_proxy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - flask-app
    networks:
      - my_network

networks:
  my_network:
    driver: bridge

